[build]
  command = "node scripts/inject-env.js"
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[redirects]]
  from   = "/"
  to     = "/pages/auth/login.html"
  status = 302

[[redirects]]
  from   = "/pages/*"
  to     = "/pages/:splat"
  status = 200
