<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daftar — Teacher Management System</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../../assets/css/main.css" />
  <link rel="stylesheet" href="../../assets/css/auth.css" />

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
  </style>
</head>
<body class="auth-shell fade-in">

  <div class="auth-brand-panel flex-col justify-between p-12" data-aos="fade-right" data-aos-duration="600">
    <div class="schedule-grid" aria-hidden="true"></div>

    <div class="relative z-10">
      <div class="flex items-center gap-2">
        <i data-lucide="graduation-cap" class="w-7 h-7"></i>
        <span class="text-lg font-bold">TMS</span>
      </div>
    </div>

    <div class="relative z-10 max-w-md">
      <h1 class="text-3xl font-extrabold leading-snug mb-3">
        Mulai kelola kelasmu tanpa kertas berserakan.
      </h1>
      <p class="text-sm text-blue-100/90">
        Daftar sekali, lalu seluruh administrasi mengajar tersusun
        otomatis di dasbor pribadi kamu.
      </p>
    </div>

    <p class="relative z-10 text-xs text-blue-100/70">
      © 2026 Teacher Management System
    </p>
  </div>

  <div class="flex items-center justify-center p-6 sm:p-12" style="background-color: var(--color-bg)">
    <div class="w-full max-w-sm" data-aos="fade-up" data-aos-duration="500">

      <div class="lg:hidden flex items-center gap-2 mb-8">
        <i data-lucide="graduation-cap" class="w-6 h-6" style="color: var(--color-primary)"></i>
        <span class="text-base font-bold">TMS</span>
      </div>

      <h2 class="text-2xl font-bold mb-1">Buat akun guru</h2>
      <p class="text-sm mb-8" style="color: var(--color-text-muted)">
        Isi data berikut untuk mulai menggunakan TMS.
      </p>

      <form id="register-form" novalidate>
        <!-- Nama Lengkap -->
        <div class="mb-4">
          <label for="full-name" class="block text-sm font-medium mb-1.5">Nama Lengkap</label>
          <input
            type="text"
            id="full-name"
            class="auth-input"
            placeholder="Contoh: Siti Rahmawati, S.Pd."
            autocomplete="name"
          />
          <p class="auth-error-text" id="full-name-error"></p>
        </div>

        <!-- Email -->
        <div class="mb-4">
          <label for="email" class="block text-sm font-medium mb-1.5">Email</label>
          <input
            type="email"
            id="email"
            class="auth-input"
            placeholder="nama@sekolah.sch.id"
            autocomplete="email"
          />
          <p class="auth-error-text" id="email-error"></p>
        </div>

        <!-- Password -->
        <div class="mb-4">
          <label for="password" class="block text-sm font-medium mb-1.5">Password</label>
          <div class="auth-input-group">
            <input
              type="password"
              id="password"
              class="auth-input pr-10"
              placeholder="Minimal 6 karakter"
              autocomplete="new-password"
            />
            <i data-lucide="eye" class="w-4 h-4 auth-toggle-password" id="toggle-password"></i>
          </div>
          <!-- Indikator kekuatan password (requirement: feedback realtime) -->
          <div class="flex gap-1 mt-2" id="strength-bar">
            <span class="h-1 flex-1 rounded-full" style="background-color: var(--color-border)"></span>
            <span class="h-1 flex-1 rounded-full" style="background-color: var(--color-border)"></span>
            <span class="h-1 flex-1 rounded-full" style="background-color: var(--color-border)"></span>
          </div>
          <p class="text-xs mt-1" id="strength-label" style="color: var(--color-text-muted)"></p>
          <p class="auth-error-text" id="password-error"></p>
        </div>

        <!-- Confirm Password -->
        <div class="mb-6">
          <label for="confirm-password" class="block text-sm font-medium mb-1.5">Konfirmasi Password</label>
          <input
            type="password"
            id="confirm-password"
            class="auth-input"
            placeholder="Ulangi password"
            autocomplete="new-password"
          />
          <p class="auth-error-text" id="confirm-password-error"></p>
        </div>

        <button
          type="submit"
          id="register-submit"
          class="relative w-full py-2.5 rounded-lg text-white font-semibold text-sm transition active:scale-[0.98]"
          style="background-color: var(--color-primary)"
        >
          <span class="btn-text">Daftar</span>
          <span class="btn-spinner"></span>
        </button>
      </form>

      <p class="text-sm text-center mt-6" style="color: var(--color-text-muted)">
        Sudah punya akun?
        <a href="./login.html" class="font-semibold" style="color: var(--color-primary)">Masuk di sini</a>
      </p>
    </div>
  </div>

  <script type="module" src="./register.js"></script>
  <script>
    const grid = document.querySelector('.schedule-grid');
    for (let i = 0; i < 80; i++) {
      const dot = document.createElement('span');
      dot.style.animationDelay = `${(i % 10) * 0.3}s`;
      grid.appendChild(dot);
    }
    lucide.createIcons();
    AOS.init();
  </script>
</body>
</html>
